<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fashion Store</title>
    <link
      rel="stylesheet"
      href="fashion.css"
    />
  </head>
  <body>
    <div class="head">
      <div class="heading">
        <h1>FASHION STORE</h1>
      </div>
      <br />
      <div class="container">
        <img
          src="t-shirt.jpeg"
          alt="T-shirt"
        />
        <img
          src="sunglass.jpeg"
          alt="Sunglasses"
        />
        <img src="shirt.jpeg" alt="Shirt" />
        <img src="jeans.jpeg" alt="Jeans" />
        <img src="shoes.jpeg" alt="Shoes" />
        <img
          src="perfume.jpeg"
          alt="Perfume"
        />
      </div>
    </div>
    <br />

    <div class="shopping">
      <img
        src="shopping.png"
        alt="Shopping"
      />
    </div>

    <div class="table-container">
      <table class="table">
        <tr class="first-row">
          <th>Festival</th>
          <th>Discount</th>
          <th>Starting Date</th>
          <th>Ending Date</th>
        </tr>
        <tr>
          <td>Independence Day</td>
          <td>30% - 40%</td>
          <td>10 August</td>
          <td>21 November</td>
        </tr>
        <tr>
          <td>Diwali</td>
          <td>50% - 60%</td>
          <td>10 November</td>
          <td>21 November</td>
        </tr>
        <tr>
          <td>Christmas</td>
          <td>35% - 50%</td>
          <td>20 December</td>
          <td>26 December</td>
        </tr>
      </table>
    </div>
  </body>
</html>
